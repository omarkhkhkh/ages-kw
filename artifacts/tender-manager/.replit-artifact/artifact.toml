kind = "web"
previewPath = "/"
title = "سجل المناقصات"
version = "1.0.0"
id = "artifacts/tender-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21269

[services.development]
run = "pnpm --filter @workspace/tender-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tender-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/tender-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21269"
BASE_PATH = "/"
