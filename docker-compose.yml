# ══════════════════════════════════════════════════════════
#  تشغيل النظام كاملًا بأمر واحد:
#     docker compose up -d --build
#  ثم افتح:  http://localhost:8080
#  (الدخول الافتراضي: admin / admin123 — غيّره فورًا)
# ══════════════════════════════════════════════════════════
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tender
      POSTGRES_PASSWORD: tender
      POSTGRES_DB: tender_manager
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tender -d tender_manager"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://tender:tender@db:5432/tender_manager
      PORT: 5000
      # ⚠️ غيّر هذا السر في أي بيئة حقيقية
      SESSION_SECRET: change-me-to-a-long-random-secret
      # الـ origins المسموح لها بالوصول للـ API (منفذ الواجهة عبر nginx)
      EXTRA_ALLOWED_ORIGINS: http://localhost:8080
      # ملاحظة: لا نضبط NODE_ENV=production هنا لأن كوكيز الجلسة تصبح
      # secure (HTTPS فقط) — اضبطه مع HTTPS حقيقي خلف reverse proxy
    volumes:
      - uploads:/app/artifacts/api-server/uploads
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db-data:
  uploads:
