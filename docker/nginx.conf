server {
  listen 80;
  server_name _;

  # حد رفع الملفات (يطابق حد الـ 20MB في السيرفر مع هامش)
  client_max_body_size 25m;

  # تمرير كل طلبات الـ API للباك إند — تمرير Host الأصلي ضروري
  # لأن السيرفر يبني روابط رفع الملفات من ترويسة Host
  location /api/ {
    proxy_pass http://api:5000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  # ملفات الواجهة الثابتة (SPA — كل المسارات ترجع index.html)
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
